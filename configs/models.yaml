# The coordinated LLM pool (open-source, served by Fireworks AI).
# Roles are assigned dynamically by the coordinator at runtime; this file only
# declares which models exist and their per-call defaults.
#
# ===== Adding a new model =====
# 1. Add a new entry under `pool:` with a short `name` and the full Fireworks `id`.
# 2. Add pricing to the PRICES dict in scripts/cost_report.py.
# 3. Run the selftest: python -m trinity.llm.fireworks_client --selftest
# 4. Update the model pool table in README.md.
# 5. The coordinator head dimension (n_a = L + 3) will auto-adjust from pool size.
#
# Example:
#   - name: claude-opus-4-8
#     id: "accounts/fireworks/models/claude-opus-4-8"

fireworks:
  base_url: "https://api.fireworks.ai/inference/v1"
  api_key_env: "FIREWORKS_API_KEY"   # value read from env; NEVER hardcode here
  timeout_s: 180                      # reasoning models can be slow; retry on timeout
  max_retries: 10                     # ride through sustained 429 windows (heavy multi-rep evals)
  max_concurrency: 8                  # parallel in-flight requests; 429s absorbed by the retry headroom above

pool:
  - name: deepseek-v4-pro
    id: "accounts/fireworks/models/deepseek-v4-pro"
  - name: glm-5p2
    id: "accounts/fireworks/models/glm-5p2"
  - name: kimi-k2p6
    id: "accounts/fireworks/models/kimi-k2p6"

# Per-role decoding defaults. Confirm/override against docs/SPEC.md once the
# paper's exact decoding settings are extracted. [provisional]
decoding:
  thinker:   { temperature: 0.7, top_p: 0.95, max_tokens: 4096 }
  worker:    { temperature: 0.2, top_p: 0.95, max_tokens: 4096 }
  verifier:  { temperature: 0.0, top_p: 1.0,  max_tokens: 2048 }
